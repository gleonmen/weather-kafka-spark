version: '3.8'

networks:
  kafka-net:
    driver: bridge
    
services:
  kafka:
    image: confluentinc/cp-kafka:latest
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"  # External listener on container port 9092
    environment:
      KAFKA_HEAP_OPTS: "-Xmx2G -Xms2G"
      KAFKA_KRAFT_MODE: "true"  # Enables KRaft mode.
      KAFKA_PROCESS_ROLES: controller,broker  # Kafka acts as both controller and broker.
      KAFKA_NODE_ID: 1  # Unique ID for the Kafka instance.
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9094"  # Controller quorum.
     
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT  # Listeners
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL  # Inter-broker uses INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka:9094  # INTERNAL on 9093, EXTERNAL on 9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://127.0.0.1:9092  # Advertise internal as kafka:9093, external as 127.0.0.1:9092
      
      KAFKA_LOG_DIRS: /var/lib/kafka/data  # Log storage location.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"  # Enables automatic topic creation.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1  # Single replica for simplicity.
      KAFKA_LOG_RETENTION_HOURS: 168  # Log retention period (7 days).
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0  # No rebalance delay.
      CLUSTER_ID: "Mk3OEYBSD34fcwNTJENDM2Qk"  # Unique Kafka cluster ID.
      
    volumes:
      - ./kafka_data:/var/lib/kafka/data     
    networks:
      - kafka-net  
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093  # Updated to use INTERNAL listener
    depends_on:
      - kafka
    networks:
      - kafka-net

  spark-master:
    image: apache/spark:3.5.5
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080
    ports:
      - "7077:7077"
      - "8081:8080"
    networks:
      - kafka-net

  spark-worker:
    image: apache/spark:3.5.5
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8080 --cores 1 --memory 1g
    depends_on:
      - spark-master
    ports:
      - "8082:8080"
    networks:
      - kafka-net

  spark-streaming:
    image: apache/spark:3.5.5
    container_name: spark-streaming
    depends_on:
      - kafka
      - spark-master
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      KAFKA_TOPIC: weather-spark-topic
    volumes:
      - ./spark:/opt/spark-apps
    command: >
      /bin/bash -lc "
      mkdir -p /tmp/.ivy2 &&
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --conf spark.jars.ivy=/tmp/.ivy2
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      /opt/spark-apps/stream_weather.py
      "
    networks:
      - kafka-net

volumes:
  kafka_data: # Volumen nombrado para mayor estabilidad

    
